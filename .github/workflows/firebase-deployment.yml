name: 🚀 AetherOS Firebase Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-firebase.txt
        pip install pytest pytest-cov pytest-asyncio
        
    - name: 🔧 Setup Firebase Emulator
      run: |
        npm install -g firebase-tools
        firebase setup:emulators:firestore
        firebase setup:emulators:storage
        
    - name: 🧪 Run Tests
      run: |
        pytest tests/ -v --cov=agent --cov-report=xml --cov-report=html
        
    - name: 📊 Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 🔍 Run Bandit Security Scan
      run: |
        pip install bandit
        bandit -r agent/ -f json -o bandit-report.json
        
    - name: 📄 Upload Security Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json

  firebase-deploy:
    name: 🚀 Deploy to Firebase
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 Install Firebase CLI
      run: npm install -g firebase-tools
      
    - name: 🔐 Setup Firebase Credentials
      run: |
        echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > serviceAccountKey.json
        firebase use ${{ secrets.FIREBASE_PROJECT_ID }}
        
    - name: 📦 Install Functions Dependencies
      run: |
        cd firebase/functions
        npm install
        
    - name: 🚀 Deploy Functions
      run: firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }}
      
    - name: 📋 Deploy Firestore Rules
      run: firebase deploy --only firestore:rules --token ${{ secrets.FIREBASE_TOKEN }}
      
    - name: 📁 Deploy Storage Rules
      run: firebase deploy --only storage:rules --token ${{ secrets.FIREBASE_TOKEN }}

  performance-test:
    name: ⚡ Performance Testing
    needs: firebase-deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 📦 Install Dependencies
      run: |
        pip install -r requirements-firebase.txt
        pip install locust
        
    - name: ⚡ Run Load Tests
      run: |
        locust --headless --users 100 --spawn-rate 10 --run-time 60s \
               --host https://${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net \
               --html performance-report.html
               
    - name: 📊 Upload Performance Report
      uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: performance-report.html

  monitoring-setup:
    name: 📊 Setup Monitoring
    needs: firebase-deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
        
    - name: 📈 Create Monitoring Dashboard
      run: |
        gcloud monitoring dashboards create \
          --config-from-file=monitoring/dashboard-config.json
          
    - name: 🚨 Setup Alerting Policies
      run: |
        gcloud alpha monitoring policies create \
          --policy-from-file=monitoring/alert-policies.json

  rollback-ready:
    name: 🔄 Rollback Preparation
    needs: firebase-deploy
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 🔄 Create Rollback Tag
      run: |
        git tag rollback-$(date +%Y%m%d-%H%M%S) ${{ github.sha }}
        git push origin --tags
        
    - name: 📋 Document Rollback
      run: |
        echo "Rollback triggered at $(date)" > rollback-log.txt
        echo "Failed deployment: ${{ github.sha }}" >> rollback-log.txt
        echo "Reason: ${{ job.status }}" >> rollback-log.txt
        
    - name: 📤 Upload Rollback Log
      uses: actions/upload-artifact@v4
      with:
        name: rollback-log
        path: rollback-log.txt
