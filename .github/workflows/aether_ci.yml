# AetherOS CI/CD Pipeline
# Comprehensive workflow for linting, type checking, testing, and security scanning

name: Aether CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      run_full_tests:
        description: 'Run full test suite including integration tests'
        required: false
        default: 'false'
        type: boolean
      skip_security:
        description: 'Skip security scanning'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  COVERAGE_THRESHOLD: '80'
  CACHE_VERSION: 'v1'

jobs:
  # Job 1: Code Linting
  linting:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint
          pip install -r requirements.txt

      - name: Run flake8
        continue-on-error: false
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          # Full linting
          flake8 agent/ tests/ --exclude=__pycache__,.git,__pycache__,*.egg-info,build,dist

      - name: Run pylint
        continue-on-error: false
        run: |
          pylint agent/aether_core/ agent/aether_forge/ agent/aether_memory/ agent/aether_orchestrator/ \
            --disable=R,C,W \
            --max-line-length=127 \
            --output-format=colorized \
            || true

  # Job 2: Type Checking
  type-checking:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -r requirements.txt
          pip install types-requests types-pytz

      - name: Run mypy type checking
        run: |
          mypy agent/aether_core/ agent/aether_forge/ agent/aether_orchestrator/ \
            --strict \
            --disallow-untyped-defs \
            --disallow-any-generics \
            --check-untyped-defs \
            --no-implicit-optional \
            --warn-redundant-casts \
            --warn-unused-ignores \
            --warn-return-any \
            --ignore-missing-imports \
            --show-error-codes \
            --pretty || true

  # Job 3: Unit Tests with Coverage
  unit-tests:
    name: Unit Tests with Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-mock
          pip install coverage[toml]
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=agent/aether_core \
            --cov=agent/aether_forge \
            --cov=agent/aether_memory \
            --cov=agent/aether_orchestrator \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # Job 4: Integration Tests (Multi-version)
  integration-tests:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [linting, type-checking]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          pytest tests/e2e_missions/ tests/integration/ \
            -v \
            --tb=short \
            --asyncio-mode=auto \
            -m "not slow" || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results/
          retention-days: 7

  # Job 5: Security Scanning
  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.skip_security != 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          pip install -r requirements.txt

      - name: Run Bandit security linter
        continue-on-error: false
        run: |
          bandit -r agent/ tests/ \
            -f json \
            -o bandit-report.json \
            -ll \
            --ignore B101,B601 || true

      - name: Run Bandit with severity check
        run: |
          bandit -r agent/ tests/ \
            -f screen \
            -lll \
            --ignore B101,B601

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: success() && hashFiles('snyk.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: snyk.sarif

      - name: Check for security vulnerabilities
        run: |
          safety check --json > safety-report.json || true
          cat safety-report.json || true

  # Job 6: Build Validation
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          pip install -r requirements.txt

      - name: Build package
        run: |
          python -m build

      - name: Check package with twine
        run: |
          twine check dist/*

  # Job 7: Docker Build Test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Aether Orchestrator)
        run: |
          docker build -f Dockerfile.aether -t aether-orchestrator:test .

      - name: Build Docker image (Swarm Node)
        run: |
          docker build -f Dockerfile.swarm -t aether-swarm:test .

      - name: Test docker-compose configuration
        run: |
          docker-compose -f docker-compose.aether.yml config

  # Job 8: Summary Report
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [linting, type-checking, unit-tests, integration-tests, security-scanning, build-validation, docker-build]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate summary
        run: |
          echo "# AetherOS CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: ${{ needs.linting.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Type Checking: ${{ needs.type-checking.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scanning: ${{ needs.security-scanning.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Validation: ${{ needs.build-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
