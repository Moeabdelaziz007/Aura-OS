name: CI Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      MOCK_SWARM: "1"  # shadow mode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/orchestrator/requirements.txt

      - name: Run router unit tests
        run: |
          python -m agent.aether_orchestrator.test_router

      - name: Simulate shadow swarm node
        run: |
          echo "Running mock swarm node..."
          python tests/shadow_swarm.py --state '{"url":"https://example.com"}' --objective 'ci-test'

      - name: Lint
        run: |
          echo "lint step placeholder"
