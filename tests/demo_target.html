<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraOS AlphaMind Demo</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 1px solid #30363d;
            border-radius: 12px;
            background-color: #161b22;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 2rem;
        }
        #target-button {
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #target-button:active {
            transform: scale(0.95);
        }
        #status {
            margin-top: 2rem;
            font-style: italic;
            color: #8b949e;
        }
        .success {
            color: #3fb950 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AuraOS UI Navigator Track</h1>
        <p>Testing Gemini 2.0 Flash Exp + AlphaMind Spatial Grounding</p>
        <button id="target-button" onclick="celebrate()">CLICK ME, GEMINI!</button>
        <div id="status">Waiting for interaction...</div>
    </div>

    <script>
        function celebrate() {
            const btn = document.getElementById('target-button');
            const status = document.getElementById('status');
            btn.style.background = 'linear-gradient(135deg, #1f6feb 0%, #58a6ff 100%)';
            btn.innerText = 'MISSION ACCOMPLISHED!';
            status.innerHTML = '<span class="success">🎯 DIRECT HIT DETECTED!</span> AuraOS has successfully taken control.';
            console.log("AlphaMind Demo: Success!");
        }
    </script>
</body>
</html>
