# AetherOS Pre-Commit Hooks Configuration
# Comprehensive hooks for code quality and consistency

# Default configuration
default_language_version:
  python: python3.11

# Global excludes
exclude: |
  (?x)^(
    \.git/|
    \.hg/|
    \.mypy_cache/|
    \.tox/|
    \.venv/|
    __pycache__/|
    \.pytest_cache/|
    \.eggs/|
    \.eggs-info/|
    build/|
    dist/|
    node_modules/|
    \.aether/|
    edge_client/src-tauri/|
    client/|
    evolution_sandbox/
  )

# Pre-commit hooks
repos:
  # Repo 1: General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Hook 1: Trailing whitespace fixer
      - id: trailing-whitespace
        name: Fix trailing whitespace
        description: Trim trailing whitespace from all lines
        exclude_types: [markdown, rst]
        exclude: '^(.*\.md)$'

      # Hook 2: End of file fixer
      - id: end-of-file-fixer
        name: Ensure files end with newline
        description: Ensures that a file is either empty or ends with one newline

      # Hook 3: Check YAML files
      - id: check-yaml
        name: Check YAML syntax
        description: Check YAML files for syntax errors
        args: ['--unsafe']

      # Hook 4: Check JSON files
      - id: check-json
        name: Check JSON syntax
        description: Check JSON files for syntax errors

      # Hook 5: Check for large files
      - id: check-added-large-files
        name: Check for large files
        description: Prevent large files from being committed
        args: ['--maxkb=1000']

      # Hook 6: Check for merge conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
        description: Check for files that contain merge conflict strings

      # Hook 7: Check for symlinks
      - id: check-symlinks
        name: Check for broken symlinks
        description: Checks for symlinks which do not point to anything

      # Hook 8: Detect private keys
      - id: detect-private-key
        name: Detect private keys
        description: Detects the presence of private keys

      # Hook 9: Mixed line ending
      - id: mixed-line-ending
        name: Fix mixed line endings
        description: Replaces or checks mixed line endings
        args: ['--fix=lf']

      # Hook 10: Fix UTF-8 byte order marker
      - id: fix-byte-order-marker
        name: Fix UTF-8 BOM
        description: Ensures that a file does not contain a UTF-8 byte order marker

  # Repo 2: Black formatter
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: Format Python code with Black
        description: The uncompromising Python code formatter
        language_version: python3.11
        args:
          - '--line-length=127'
          - '--target-version=py311'
          - '--color'
        types: [python]
        exclude: |
          (?x)^(
            agent/aether_memory/|
            migration/
          )

  # Repo 3: isort import sorter
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python imports with isort
        description: Sort Python imports
        language_version: python3.11
        args:
          - '--profile=black'
          - '--line-length=127'
          - '--multi-line=3'
          - '--trailing-comma'
          - '--force-grid-wrap=0'
          - '--use-parentheses'
          - '--ensure-newline-before-comments'
          - '--known-third-party=pytest,requests,google'
        types: [python]
        exclude: |
          (?x)^(
            agent/aether_memory/|
            migration/
          )

  # Repo 4: flake8 linter
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python code with flake8
        description: Check Python code for style and syntax errors
        language_version: python3.11
        args:
          - '--max-line-length=127'
          - '--ignore=E203,W503,E501'
          - '--exclude=__pycache__,.git,__pycache__,*.egg-info,build,dist,migrations'
          - '--max-complexity=15'
          - '--show-source'
          - '--statistics'
        types: [python]
        exclude: |
          (?x)^(
            agent/aether_memory/|
            migration/
          )

  # Repo 5: mypy type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Type check Python code with mypy
        description: Static type checker for Python
        language_version: python3.11
        args:
          - '--strict'
          - '--disallow-untyped-defs'
          - '--disallow-any-generics'
          - '--check-untyped-defs'
          - '--no-implicit-optional'
          - '--warn-redundant-casts'
          - '--warn-unused-ignores'
          - '--warn-return-any'
          - '--ignore-missing-imports'
          - '--show-error-codes'
          - '--pretty'
        types: [python]
        additional_dependencies:
          - types-requests
          - types-pytz
          - types-PyYAML
        exclude: |
          (?x)^(
            agent/aether_memory/|
            migration/|
            tests/
          )

  # Repo 6: Bandit security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security check with Bandit
        description: Security-oriented static analyzer for Python
        language_version: python3.11
        args:
          - '-ll'
          - '--ignore=B101,B601'
          - '-f'
          - 'screen'
        types: [python]
        exclude: |
          (?x)^(
            tests/|
            migration/
          )

  # Repo 7: Pylint linter
  - repo: https://github.com/pycqa/pylint
    rev: v3.0.3
    hooks:
      - id: pylint
        name: Lint Python code with Pylint
        description: Python code static analysis
        language_version: python3.11
        args:
          - '--max-line-length=127'
          - '--disable=R,C,W'
          - '--output-format=colorized'
        types: [python]
        exclude: |
          (?x)^(
            agent/aether_memory/|
            migration/|
            tests/
          )

  # Repo 8: Pyupgrade (Python syntax modernizer)
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.0
    hooks:
      - id: pyupgrade
        name: Upgrade Python syntax
        description: Automatically upgrade syntax for newer versions of Python
        language_version: python3.11
        args:
          - '--py311-plus'
        types: [python]
        exclude: |
          (?x)^(
            agent/aether_memory/|
            migration/
          )

  # Repo 9: Check for TODO/FIXME comments
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-toml
        name: Check TOML syntax
        description: Check TOML files for syntax errors

  # Repo 10: Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        description: Dockerfile linter
        args:
          - '--ignore=DL3008'
          - '--ignore=DL3013'
        types: [dockerfile]

  # Repo 11: Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: Lint shell scripts
        description: Shell script static analysis
        args: ['--severity=warning']
        types: [shell]

  # Repo 12: Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        description: Check Markdown files for style and syntax errors
        args:
          - '--fix'
        exclude: '(AetherOS Plan FIles/|AetherOS_Gemini_Submission/|\.idx/)'

  # Repo 13: YAML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.12.0
    hooks:
      - id: pretty-format-yaml
        name: Format YAML files
        description: Format YAML files consistently
        args:
          - '--autofix'
          - '--indent=2'
          - '--offset=2'
        files: '^(.*\.ya?ml)$'

  # Repo 14: JSON formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.12.0
    hooks:
      - id: pretty-format-json
        name: Format JSON files
        description: Format JSON files consistently
        args:
          - '--autofix'
          - '--indent=2'
          - '--no-sort-keys'
        files: '^(.*\.json)$'

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
